name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore sstool.sln
        shell: cmd

      - name: Build (x64 Release)
        run: msbuild sstool.sln /p:Configuration=Release /p:Platform=x64 /m
        shell: cmd

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sstool-x64-release
          path: x64/Release/sstool.exe
          if-no-files-found: error
