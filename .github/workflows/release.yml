name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore sstool.sln
        shell: cmd

      - name: Build (x64 Release)
        run: msbuild sstool.sln /p:Configuration=Release /p:Platform=x64 /m
        shell: cmd

      - name: Package
        run: |
          mkdir dist
          copy x64\Release\sstool.exe dist\
          copy README.md dist\
          copy LICENSE dist\
        shell: cmd

      - name: Zip
        run: Compress-Archive -Path dist\* -DestinationPath sstool-${{ github.ref_name }}-x64.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sstool-${{ github.ref_name }}-x64.zip
          generate_release_notes: true
